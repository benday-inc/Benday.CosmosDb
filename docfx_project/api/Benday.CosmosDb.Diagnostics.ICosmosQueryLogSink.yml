  assemblies:
  - Benday.CosmosDb
  namespace: Benday.CosmosDb.Diagnostics
  summary: >-
    A sink for Cosmos query diagnostics. Implementations receive a

    <xref href="Benday.CosmosDb.Diagnostics.CosmosQueryDiagnostics" data-throw-if-not-resolved="false"></xref> event for every query execution

    the library captures — point operations, feed response pages, and

    query totals.
  remarks: >-
    <p>

    Implementations are registered in the DI container (typically as

    singletons) and injected into <code>CosmosRepository&lt;T&gt;</code> instances.

    A default <xref href="Benday.CosmosDb.Diagnostics.NoOpCosmosQueryLogSink" data-throw-if-not-resolved="false"></xref> is registered

    automatically if no other sink is configured, so consumers only

    register a sink when they want non-default behavior.

    </p>

    <p>

    The <xref href="Benday.CosmosDb.Diagnostics.ICosmosQueryLogSink.Record(Benday.CosmosDb.Diagnostics.CosmosQueryDiagnostics)" data-throw-if-not-resolved="false"></xref> method is synchronous and fire-and-forget

    from the library's perspective. Sinks that need async I/O (file

    writes, network calls) should buffer internally and flush from a

    background worker — the library will not await the sink and will

    not retry on failure.

    </p>

    <p>

    Exceptions thrown from <xref href="Benday.CosmosDb.Diagnostics.ICosmosQueryLogSink.Record(Benday.CosmosDb.Diagnostics.CosmosQueryDiagnostics)" data-throw-if-not-resolved="false"></xref> are caught by the

    library, logged as warnings to <code>ILogger</code>, and suppressed. A

    broken sink must not prevent a query from completing.

    </p>
  example: []
  syntax:
    content: public interface ICosmosQueryLogSink
    content.vb: Public Interface ICosmosQueryLogSink
