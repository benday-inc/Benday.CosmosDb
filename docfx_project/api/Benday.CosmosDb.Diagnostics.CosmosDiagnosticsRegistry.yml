  namespace: Benday.CosmosDb.Diagnostics
  summary: >-
    Singleton registry that holds per-entity-type diagnostic options for

    <code>CosmosRepository&lt;T&gt;</code>. Repositories resolve this from DI in

    their constructor and look up their own options via

    <xref href="Benday.CosmosDb.Diagnostics.CosmosDiagnosticsRegistry.GetFor%60%601" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    Configure through

    <xref href="Benday.CosmosDb.Utilities.CosmosRegistrationHelper.ConfigureDiagnostics%60%601(System.Action%7bBenday.CosmosDb.Diagnostics.CosmosRepositoryDiagnosticsOptions%7d)" data-throw-if-not-resolved="false"></xref>

    or <xref href="Benday.CosmosDb.Utilities.CosmosRegistrationHelper.ConfigureDiagnosticsDefault(System.Action%7bBenday.CosmosDb.Diagnostics.CosmosRepositoryDiagnosticsOptions%7d)" data-throw-if-not-resolved="false"></xref>

    — those helpers add or fetch the singleton from the service collection

    and mutate it. Direct use of <xref href="Benday.CosmosDb.Diagnostics.CosmosDiagnosticsRegistry.Set%60%601(System.Action%7bBenday.CosmosDb.Diagnostics.CosmosRepositoryDiagnosticsOptions%7d)" data-throw-if-not-resolved="false"></xref> /

    <xref href="Benday.CosmosDb.Diagnostics.CosmosDiagnosticsRegistry.SetDefault(System.Action%7bBenday.CosmosDb.Diagnostics.CosmosRepositoryDiagnosticsOptions%7d)" data-throw-if-not-resolved="false"></xref> is supported but not the typical path.
