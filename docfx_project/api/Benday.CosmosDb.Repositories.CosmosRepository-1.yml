    id: ExecuteScalarAsync
    path: ../Benday.CosmosDb/Repositories/CosmosRepository.cs
    startLine: 637
  assemblies:
  - Benday.CosmosDb
  namespace: Benday.CosmosDb.Repositories
  summary: >-
    Executes a scalar Cosmos SDK LINQ operation (such as <code>CountAsync</code>,

    <code>FirstOrDefaultAsync</code>, <code>MaxAsync</code>) through the library's

    diagnostics pipeline. The SDK's extension methods on <xref href="System.Linq.IQueryable" data-throw-if-not-resolved="false"></xref>

    bypass this pipeline when called directly; this helper lets you call

    them while still capturing request charge, timing, query text, and

    cross-partition warnings in the same format as list queries.
  remarks: >-
    <p>

    The SQL text for diagnostics is extracted from the <code class="paramref">query</code>

    via <xref href="Microsoft.Azure.Cosmos.Linq.CosmosLinqExtensions.ToQueryDefinition%60%601(System.Linq.IQueryable%7b%60%600%7d)" data-throw-if-not-resolved="false"></xref>. For some

    queryable shapes this extraction can fail; when it does, the query

    still executes normally and all other diagnostics fields

    (request charge, duration, result count, cross-partition) are

    populated. The <xref href="Benday.CosmosDb.Diagnostics.CosmosQueryDiagnostics.QueryText" data-throw-if-not-resolved="false"></xref> field

    on the resulting event will be null in that case.

    </p>
  example:
  - >-
    <pre><code class="lang-csharp">public async Task&lt;int&gt; GetCountAsync(string tenantId)

    {
        var queryContext = await GetQueryContextAsync(tenantId);
        return await ExecuteScalarAsync(
            queryContext.Queryable,
            q =&gt; q.CountAsync(),
            GetQueryDescription(nameof(GetCountAsync)),
            queryContext.PartitionKey);
    }</code></pre>
  syntax:
    content: protected Task<TResult> ExecuteScalarAsync<TResult>(IQueryable<T> query, Func<IQueryable<T>, Task<Response<TResult>>> operation, string queryDescription, PartitionKey partitionKey, Func<TResult, int>? resultCountSelector = null)
    parameters:
    - id: query
      type: System.Linq.IQueryable{{T}}
      description: The <xref href="System.Linq.IQueryable%601" data-throw-if-not-resolved="false"></xref> against which to execute the operation.
    - id: operation
      type: System.Func{System.Linq.IQueryable{{T}},System.Threading.Tasks.Task{Microsoft.Azure.Cosmos.Response{{TResult}}}}
      description: >-
        A delegate that invokes the desired SDK extension method on the queryable

        and returns its <xref href="Microsoft.Azure.Cosmos.Response%601" data-throw-if-not-resolved="false"></xref>.
    - id: queryDescription
      type: System.String
      description: Logging description for the query.
    - id: partitionKey
      type: Microsoft.Azure.Cosmos.PartitionKey
      description: Partition key scope for the query.
    - id: resultCountSelector
      type: System.Func{{TResult},System.Int32}
      description: >-
        Optional: a delegate that maps the scalar result to an integer count for

        diagnostics purposes. Defaults to 1 if the result is non-null or a value

        type; 0 if the result is null. For most scalar operations the default

        is fine.
    typeParameters:
    - id: TResult
      description: The return type of the SDK operation.
    return:
      type: System.Threading.Tasks.Task{{TResult}}
      description: The resource value from the SDK's <xref href="Microsoft.Azure.Cosmos.Response%601" data-throw-if-not-resolved="false"></xref>.
    content.vb: Protected Function ExecuteScalarAsync(Of TResult)(query As IQueryable(Of T), operation As Func(Of IQueryable(Of T), Task(Of Response(Of TResult))), queryDescription As String, partitionKey As PartitionKey, resultCountSelector As Func(Of TResult, Integer) = Nothing) As Task(Of TResult)
  overload: Benday.CosmosDb.Repositories.CosmosRepository`1.ExecuteScalarAsync*
  seealso:
  - linkId: Benday.CosmosDb.Repositories.CosmosRepository`1.GetResultsAsync``1(System.Linq.IQueryable{``0},System.String,Microsoft.Azure.Cosmos.PartitionKey)
    commentId: M:Benday.CosmosDb.Repositories.CosmosRepository`1.GetResultsAsync``1(System.Linq.IQueryable{``0},System.String,Microsoft.Azure.Cosmos.PartitionKey)
