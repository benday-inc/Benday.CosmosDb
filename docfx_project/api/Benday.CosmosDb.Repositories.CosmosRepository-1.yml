  namespace: Benday.CosmosDb.Repositories
  summary: >-
    Executes a raw Cosmos SQL query and returns all results, logging the

    same diagnostics as the LINQ overload so raw-SQL queries and LINQ

    queries show up symmetrically in structured logs.
  remarks: >-
    Use this when a query can't be expressed in LINQ — cross-apply joins

    over nested arrays, dynamic EXISTS clauses, VectorDistance, conditional

    aggregation, etc. The library's LINQ support handles the common case;

    this overload covers the cases it can't.
  example: []
  syntax:
    content: protected Task<List<TResult>> GetResultsAsync<TResult>(QueryDefinition query, string queryDescription, PartitionKey partitionKey)
    parameters:
    - id: query
      type: Microsoft.Azure.Cosmos.QueryDefinition
      description: The parameterized Cosmos SQL query to run.
    - id: queryDescription
      type: System.String
      description: Logging description for the query.
    - id: partitionKey
      type: Microsoft.Azure.Cosmos.PartitionKey
      description: Partition key scope for the query.
    typeParameters:
    - id: TResult
      description: Type of item returned by the query. Typically <code class="typeparamref">T</code>, but may be a projected type when the SQL query selects into a different shape.
    return:
      type: System.Threading.Tasks.Task{System.Collections.Generic.List{{TResult}}}
      description: All matching items.
    content.vb: Protected Function GetResultsAsync(Of TResult)(query As QueryDefinition, queryDescription As String, partitionKey As PartitionKey) As Task(Of List(Of TResult))
