  assemblies:
  - Benday.CosmosDb
  namespace: Benday.CosmosDb.Repositories
  summary: Basic implementation of a Cosmos DB repository. Provides basic CRUD operations for a Cosmos DB entity, manages the container instance, and provides common functionality for custom queries as protected values and methods.
  remarks: >-
    <p>

    The library supports two complementary ways to capture query diagnostics,

    and both fire for every event — using one does not disable the other:

    </p>

    <ul><li>
          <b>Per-repository customization</b> via overriding
          <xref href="Benday.CosmosDb.Repositories.CosmosRepository%601.OnQueryDiagnostics(Benday.CosmosDb.Diagnostics.CosmosQueryDiagnostics)" data-throw-if-not-resolved="false"></xref>. Use this when a specific repository
          needs non-default handling of its own events.
        </li><li>
          <b>App-wide structured diagnostics</b> via implementing and registering
          an <xref href="Benday.CosmosDb.Diagnostics.ICosmosQueryLogSink" data-throw-if-not-resolved="false"></xref> in DI. Use this for cross-cutting
          behavior like structured log files, test captures, or production
          observability pipelines. A default <xref href="Benday.CosmosDb.Diagnostics.NoOpCosmosQueryLogSink" data-throw-if-not-resolved="false"></xref>
          is registered automatically; consumers override it by calling
          <code>CosmosRegistrationHelper.WithQueryLogSink</code> or by registering
          their own implementation in the service collection before
          <code>AddCosmosDb</code>.
        </li></ul>
    <p>

    Diagnostic events are distinguished by

    <xref href="Benday.CosmosDb.Diagnostics.CosmosQueryDiagnostics.EventKind" data-throw-if-not-resolved="false"></xref> — point operations, per-page

    feed responses, and query totals. Neither channel affects <xref href="Microsoft.Extensions.Logging.ILogger" data-throw-if-not-resolved="false"></xref>

    output, which fires unchanged regardless of how diagnostics are routed.

    </p>
