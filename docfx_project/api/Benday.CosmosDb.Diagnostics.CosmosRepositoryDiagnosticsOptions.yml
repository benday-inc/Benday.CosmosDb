  assemblies:
  - Benday.CosmosDb
  namespace: Benday.CosmosDb.Diagnostics
  summary: >-
    Per-entity diagnostics toggles read by <code>CosmosRepository&lt;T&gt;</code> at

    query time. Configure these through the

    <xref href="Benday.CosmosDb.Utilities.CosmosRegistrationHelper.ConfigureDiagnostics%60%601(System.Action%7bBenday.CosmosDb.Diagnostics.CosmosRepositoryDiagnosticsOptions%7d)" data-throw-if-not-resolved="false"></xref>

    and <xref href="Benday.CosmosDb.Utilities.CosmosRegistrationHelper.ConfigureDiagnosticsDefault(System.Action%7bBenday.CosmosDb.Diagnostics.CosmosRepositoryDiagnosticsOptions%7d)" data-throw-if-not-resolved="false"></xref>

    helpers; the repository looks up its options from

    <xref href="Benday.CosmosDb.Diagnostics.CosmosDiagnosticsRegistry" data-throw-if-not-resolved="false"></xref> in its constructor.
