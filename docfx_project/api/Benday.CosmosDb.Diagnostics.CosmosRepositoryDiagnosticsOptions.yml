- uid: Benday.CosmosDb.Diagnostics.CosmosRepositoryDiagnosticsOptions.CaptureIndexMetrics
  commentId: P:Benday.CosmosDb.Diagnostics.CosmosRepositoryDiagnosticsOptions.CaptureIndexMetrics
  id: CaptureIndexMetrics
  parent: Benday.CosmosDb.Diagnostics.CosmosRepositoryDiagnosticsOptions
  langs:
  - csharp
  - vb
  name: CaptureIndexMetrics
  nameWithType: CosmosRepositoryDiagnosticsOptions.CaptureIndexMetrics
  fullName: Benday.CosmosDb.Diagnostics.CosmosRepositoryDiagnosticsOptions.CaptureIndexMetrics
  type: Property
  source:
    remote:
      path: Benday.CosmosDb/Diagnostics/CosmosRepositoryDiagnosticsOptions.cs
      branch: master
      repo: https://github.com/benday-inc/Benday.CosmosDb.git
    id: CaptureIndexMetrics
    path: ../Benday.CosmosDb/Diagnostics/CosmosRepositoryDiagnosticsOptions.cs
    startLine: 21
  assemblies:
  - Benday.CosmosDb
  namespace: Benday.CosmosDb.Diagnostics
  summary: >-
    When true, the repository sets

    <code>QueryRequestOptions.PopulateIndexMetrics = true</code> on every query

    it issues, and copies <code>FeedResponse.IndexMetrics</code> into the

    <xref href="Benday.CosmosDb.Diagnostics.CosmosQueryDiagnostics.IndexMetrics" data-throw-if-not-resolved="false"></xref> field for sinks

    to record. Defaults to <code>false</code> — Microsoft recommends only

    enabling this while debugging slow queries because it adds

    measurable RU and latency overhead per request.
  example: []
  syntax:
    content: public bool CaptureIndexMetrics { get; set; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Public Property CaptureIndexMetrics As Boolean
  overload: Benday.CosmosDb.Diagnostics.CosmosRepositoryDiagnosticsOptions.CaptureIndexMetrics*
