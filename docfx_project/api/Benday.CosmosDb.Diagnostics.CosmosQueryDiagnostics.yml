    <code>FeedResponse&lt;T&gt;.IndexMetrics</code>. Populated only when the

    repository's <xref href="Benday.CosmosDb.Diagnostics.CosmosRepositoryDiagnosticsOptions.CaptureIndexMetrics" data-throw-if-not-resolved="false"></xref>

