  assemblies:
  - Benday.CosmosDb
  namespace: Benday.CosmosDb.Diagnostics
  summary: >-
    The aggregate total for a completed query. Emitted exactly once

    per top-level query execution, regardless of how many

    <xref href="Benday.CosmosDb.Diagnostics.CosmosQueryEventKind.FeedResponsePage" data-throw-if-not-resolved="false"></xref> events preceded it. For scalar operations

    (<code>CountAsync</code>, <code>FirstOrDefaultAsync</code> via <code>ExecuteScalarAsync</code>)

    this is the only event emitted.
  example: []
  syntax:
    content: QueryTotal = 2
    return:
      type: Benday.CosmosDb.Diagnostics.CosmosQueryEventKind
