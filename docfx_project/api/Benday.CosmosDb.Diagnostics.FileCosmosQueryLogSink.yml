    startLine: 27
  assemblies:
  - Benday.CosmosDb
  namespace: Benday.CosmosDb.Diagnostics
  summary: >-
    An <xref href="Benday.CosmosDb.Diagnostics.ICosmosQueryLogSink" data-throw-if-not-resolved="false"></xref> that appends each diagnostics

    event as a single line of JSON (NDJSON / JSON Lines) to a file.
  remarks: >-
    <p>

    Events are handed to an in-memory queue from <xref href="Benday.CosmosDb.Diagnostics.FileCosmosQueryLogSink.Record(Benday.CosmosDb.Diagnostics.CosmosQueryDiagnostics)" data-throw-if-not-resolved="false"></xref> and

    written to disk by a single background thread, so the library's

    query-execution path is never blocked on file I/O. Dispose the sink

    (or let the host shut it down) to flush any queued events.

    </p>

    <p>

    If the queue fills past <xref href="Benday.CosmosDb.Diagnostics.CosmosFileLogSinkOptions.QueueCapacity" data-throw-if-not-resolved="false"></xref>

    (default 10,000), new events are dropped. This keeps a stuck disk

    from growing memory without bound.

    </p>
  example: []
  syntax:
    content: 'public sealed class FileCosmosQueryLogSink : ICosmosQueryLogSink, IDisposable'
    content.vb: Public NotInheritable Class FileCosmosQueryLogSink Implements ICosmosQueryLogSink, IDisposable
